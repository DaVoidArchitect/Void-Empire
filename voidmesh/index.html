<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#020105" />
    <meta name="description" content="iVoid Sovereign Portal — Unified civilizational spatial canvas platform integrating peer-to-peer social networks, global commodity trading, cognitive computing telemetry, and Truth AI companion nodes." />
    <title>iVoid — Sovereign Portal</title>
    <link rel="icon" type="image/png" href="void_portal_icon.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=Inter:wght@300;400;600&family=Outfit:wght@300;900&display=swap" rel="stylesheet">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #020105;
        color: #F5F5F7;
        font-family: 'Inter', sans-serif;
        height: 220vh; /* Scroll-linked morph space */
        overflow-x: hidden;
      }
      #void-framebuffer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        display: block;
      }
      #loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'IBM Plex Mono', monospace;
        color: #E5B823;
        font-size: 14px;
        z-index: 2;
        letter-spacing: 0.3em;
        pointer-events: none;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <header class="sr-only">
      <h1>iVoid Sovereign Portal</h1>
    </header>
    <main id="void-portal-viewport">
      <div id="loader">BECOMING...</div>
      <canvas id="void-framebuffer"></canvas>
    </main>
    <script src="wasm_bootstrapper.js"></script>
  </body>
</html>
