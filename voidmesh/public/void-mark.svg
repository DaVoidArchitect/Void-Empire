<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Void black-hole orbit mark</title>
  <desc id="desc">A dark black-hole core surrounded by woven gold orbital rings and violet gravity waves.</desc>
  <defs>
    <radialGradient id="space" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(254 236) rotate(90) scale(270)">
      <stop offset="0" stop-color="#171a2f"/>
      <stop offset="0.34" stop-color="#08080d"/>
      <stop offset="0.72" stop-color="#0b0a12"/>
      <stop offset="1" stop-color="#050507"/>
    </radialGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 252) scale(96)">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="0.44" stop-color="#010107"/>
      <stop offset="0.72" stop-color="#0d1020"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.22"/>
    </radialGradient>
    <linearGradient id="gold" x1="126" y1="122" x2="382" y2="388" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff2c1"/>
      <stop offset="0.25" stop-color="#d7a85d"/>
      <stop offset="0.52" stop-color="#f1d18a"/>
      <stop offset="0.76" stop-color="#9b6b3b"/>
      <stop offset="1" stop-color="#fff0bd"/>
    </linearGradient>
    <linearGradient id="roseGold" x1="102" y1="382" x2="392" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b573b"/>
      <stop offset="0.36" stop-color="#f0b98c"/>
      <stop offset="0.68" stop-color="#fff0c6"/>
      <stop offset="1" stop-color="#b9824f"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#space)"/>
  <rect x="24" y="24" width="464" height="464" rx="74" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="256" cy="256" r="196" fill="none" stroke="#bb9cff" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="256" cy="256" r="158" fill="none" stroke="#7c3aed" stroke-opacity="0.13" stroke-width="2"/>
  <path d="M84 276c88-82 254-98 344-14" fill="none" stroke="#7c3aed" stroke-opacity="0.38" stroke-width="13" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M94 318c92-116 238-145 324-72" fill="none" stroke="#bb9cff" stroke-opacity="0.22" stroke-width="7" stroke-linecap="round"/>
  <g transform="translate(256 246)" fill="none" stroke-linecap="round">
    <ellipse rx="150" ry="57" transform="rotate(-22)" stroke="url(#gold)" stroke-width="13"/>
    <ellipse rx="150" ry="57" transform="rotate(22)" stroke="url(#roseGold)" stroke-width="13"/>
    <ellipse rx="150" ry="57" transform="rotate(64)" stroke="url(#gold)" stroke-width="11"/>
    <ellipse rx="150" ry="57" transform="rotate(104)" stroke="url(#roseGold)" stroke-width="11"/>
    <ellipse rx="118" ry="44" transform="rotate(-48)" stroke="#fff5cf" stroke-opacity="0.72" stroke-width="5"/>
    <ellipse rx="118" ry="44" transform="rotate(48)" stroke="#c78c57" stroke-opacity="0.58" stroke-width="5"/>
  </g>
  <circle cx="256" cy="246" r="84" fill="url(#core)"/>
  <circle cx="256" cy="246" r="54" fill="#000000"/>
  <path d="M216 224c28-29 78-25 100 5-28-12-64-6-91 22-16 17-26 35-31 54-11-25-3-58 22-81Z" fill="#17203d" fill-opacity="0.78"/>
  <circle cx="256" cy="246" r="90" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <path d="M112 164c66-60 157-83 255-44" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
  <path d="M115 382c82 46 196 52 285-2" fill="none" stroke="#f4d58d" stroke-opacity="0.16" stroke-width="2"/>
</svg>
